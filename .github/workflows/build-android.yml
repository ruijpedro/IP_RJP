name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

            - name: Install Dependencies
        run: |
          npm install -g npm@10.9.2
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --no-audit --no-fund --no-package-lock

      - name: Build WebApp
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Prepare Android Platform
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Apply IP_RJP Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26

          cp resources/android/ic_launcher_mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp resources/android/ic_launcher_mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp resources/android/ic_launcher_hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp resources/android/ic_launcher_hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp resources/android/ic_launcher_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp resources/android/ic_launcher_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp resources/android/ic_launcher_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp resources/android/ic_launcher_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp resources/android/ic_launcher_xxxhdpi.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp resources/android/ic_launcher_xxxhdpi.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          cp resources/android/ic_launcher_adaptive_back_mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher_adaptive_back.png
          cp resources/android/ic_launcher_adaptive_fore_mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher_adaptive_fore.png
          cp resources/android/ic_launcher_adaptive_back_hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher_adaptive_back.png
          cp resources/android/ic_launcher_adaptive_fore_hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher_adaptive_fore.png
          cp resources/android/ic_launcher_adaptive_back_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_adaptive_back.png
          cp resources/android/ic_launcher_adaptive_fore_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_adaptive_fore.png
          cp resources/android/ic_launcher_adaptive_back_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_adaptive_back.png
          cp resources/android/ic_launcher_adaptive_fore_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_adaptive_fore.png
          cp resources/android/ic_launcher_adaptive_back_xxxhdpi.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_adaptive_back.png
          cp resources/android/ic_launcher_adaptive_fore_xxxhdpi.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_adaptive_fore.png

          cp resources/android/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp resources/android/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Ensure Android Manifest icon
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/src/main/AndroidManifest.xml')
          s = p.read_text()
          s = s.replace('android:label="IP_RJP"', 'android:label="IP_RJP" android:icon="@mipmap/ic_launcher" android:roundIcon="@mipmap/ic_launcher_round"') if 'android:icon=' not in s else s
          p.write_text(s)
          PY

      - name: Build Debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IP_RJP_Debug_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
