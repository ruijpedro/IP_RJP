name: Build IP_RJP Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reset npm
        run: |
          npm install -g npm@latest
          npm cache clean --force
          rm -rf node_modules package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps --no-package-lock

      - name: Build WebApp
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Add Android platform if needed
        run: |
          if [ ! -d "android" ] || [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Apply IP_RJP icons and labels
        run: |
          cp -R resources/android/res/* android/app/src/main/res/
          python3 - <<'PY'
          from pathlib import Path
          import re
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          s = manifest.read_text()
          s = re.sub(r'android:icon="[^"]+"', 'android:icon="@mipmap/ic_launcher"', s)
          if 'android:roundIcon=' in s:
              s = re.sub(r'android:roundIcon="[^"]+"', 'android:roundIcon="@mipmap/ic_launcher_round"', s)
          else:
              s = s.replace('<application ', '<application android:roundIcon="@mipmap/ic_launcher_round" ', 1)
          if 'android:label=' in s:
              s = re.sub(r'android:label="[^"]+"', 'android:label="IP_RJP"', s, count=1)
          manifest.write_text(s)
          strings = Path('android/app/src/main/res/values/strings.xml')
          if strings.exists():
              t = strings.read_text()
              t = re.sub(r'<string name="app_name">.*?</string>', '<string name="app_name">IP_RJP</string>', t)
              strings.write_text(t)
          PY

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IP_RJP-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
