name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm cache clean --force
          rm -rf node_modules
          rm -f package-lock.json
          npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build WebApp
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create Android Platform if Missing
        run: |
          if [ ! -d "android" ] || [ ! -f "android/gradlew" ]; then
            echo "Android platform missing. Recreating with Capacitor..."
            rm -rf android
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Apply Android Icon
        run: |
          if [ -d "resources/android/res" ]; then
            cp -R resources/android/res/* android/app/src/main/res/
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IP_RJP_Debug_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
