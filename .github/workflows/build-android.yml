name: Build IP_RJP Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build WebApp
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

           - name: Build APK
        run: |
          if [ ! -f "android/gradlew" ]; then
            echo "gradlew não existe. A recriar plataforma Android..."
            rm -rf android
            npx cap add android
            npx cap sync android
          fi

          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
