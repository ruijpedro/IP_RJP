name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install -g npm@10.9.2
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --no-audit --no-fund --no-package-lock

      - name: Build WebApp
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Prepare Android Platform
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Apply IP_RJP icons
        run: |
          if [ -d "android/app/src/main/res" ]; then
            echo "Android res folder exists"
          fi

      - name: Ensure Android Manifest icon
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="IP_RJP"/g' $MANIFEST
          if ! grep -q 'android:icon="@mipmap\/ic_launcher"' $MANIFEST; then
            sed -i 's/<application/<application android:icon="@mipmap\/ic_launcher" android:roundIcon="@mipmap\/ic_launcher_round"/' $MANIFEST
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IP_RJP_Debug_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
