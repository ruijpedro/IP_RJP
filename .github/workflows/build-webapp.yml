name: Build IP_RJP WebApp

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-webapp:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps --no-package-lock

      - name: Build WebApp
        run: npm run build

      - name: Upload WebApp artifact
        uses: actions/upload-artifact@v4
        with:
          name: IP_RJP-webapp-dist
          path: dist
